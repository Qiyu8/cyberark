<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实体列表 - 赛博方舟</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ===== 画廊网格布局 ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }
        
        /* ===== 单张画廊卡片 ===== */
        .gallery-card {
            background: rgba(10,10,20,0.9);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            animation: cardFadeIn 0.6s ease forwards;
            opacity: 0;
        }
        .gallery-card:hover {
            transform: translateY(-8px);
            border-color: rgba(201,168,76,0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.1);
        }
        
        /* 封面图区域 */
        .card-cover {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            overflow: hidden;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 100%);
        }
        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            filter: brightness(0.85) saturate(1.1);
        }
        .gallery-card:hover .card-cover img {
            transform: scale(1.08);
            filter: brightness(0.95) saturate(1.2);
        }
        
        /* 排名标签 */
        .card-rank {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: #c9a84c;
            z-index: 2;
        }
        
        /* 封面上的渐变遮罩 */
        .card-cover::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(10,10,20,0.9) 0%, transparent 100%);
            pointer-events: none;
        }
        
        /* 卡片信息 */
        .card-body {
            padding: 16px 20px 20px;
        }
        .card-title {
            font-family: 'Noto Sans SC', 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #e8e0d0;
            margin: 0 0 6px 0;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-meta {
            font-size: 0.82rem;
            color: #808090;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-desc {
            font-size: 0.8rem;
            color: #606070;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 0;
        }
        
        /* 卡片底部标签 */
        .card-tags {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .card-tag {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.2);
            color: #c9a84c;
        }
        .card-tag.blue {
            background: rgba(0,212,255,0.1);
            border-color: rgba(0,212,255,0.2);
            color: #00d4ff;
        }
        
        /* 悬浮时显示"查看详情" */
        .card-hover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            z-index: 3;
            border-radius: 16px;
            overflow: hidden;
        }
        .gallery-card:hover .card-hover-overlay {
            background: rgba(0,0,0,0.3);
        }
        .card-view-btn {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            background: rgba(201,168,76,0.9);
            color: #0a0a0f;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .gallery-card:hover .card-view-btn {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 骨架屏加载动画 */
        .skeleton-card {
            background: rgba(10,10,20,0.9);
            border: 1px solid rgba(201,168,76,0.1);
            border-radius: 16px;
            overflow: hidden;
            animation: pulse 1.8s ease-in-out infinite;
        }
        .skeleton-cover {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(90deg, #1a1a2e 25%, #2a2a3e 50%, #1a1a2e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-body { padding: 16px 20px 20px; }
        .skeleton-line {
            height: 14px;
            background: linear-gradient(90deg, #1a1a2e 25%, #2a2a3e 50%, #1a1a2e 75%);
            background-size: 200% 100%;
            border-radius: 4px;
            margin-bottom: 8px;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        /* 榜单信息头部 */
        .ranking-header {
            background: rgba(15,15,25,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 20px;
            padding: 30px 35px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .ranking-header h1 {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: 2rem;
            color: #e8e0d0;
            margin: 0;
            background: linear-gradient(135deg, #e8e0d0, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ranking-stats {
            display: flex;
            gap: 24px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #c9a84c;
        }
        .stat-label {
            font-size: 0.78rem;
            color: #606070;
            margin-top: 2px;
        }
        
        /* 搜索栏 */
        .search-area {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(15,15,25,0.9);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 12px;
            color: #e0e0f6;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus {
            border-color: rgba(201,168,76,0.5);
            box-shadow: 0 0 20px rgba(201,168,76,0.1);
        }
        .search-input::placeholder { color: #505060; }
    </style>
</head>

                <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-body"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:60%"></div><div class="skeleton-line" style="width:50%"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-body"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:60%"></div><div class="skeleton-line" style="width:50%"></div></div></div>

    <script>
    // ===== 实体列表页 - 画廊模式 =====
    const PAGE_SIZE = 24;
    let allEntities = [];       // 原始列表（全量）
    let filteredEntities = [];  // 搜索过滤后的列表
    let enrichCache = new Map();// file → enriched data 缓存
    let currentPage = 1;
    let catSlug = '', subSlug = '', fullSubSlug = '';
    
    // 从 md 文本提取信息
    function extractFromMd(mdText, fileName) {
        const lines = mdText.split('\n');
        let title = fileName.replace(/\.md$/, '').replace(/^\d+_/, '');
        let artist = '', year = '', imageUrl = '', desc = '', extra = '';
        
        for (const line of lines) {
            const l = line.trim();
            if (l.startsWith('# ')) {
                title = l.replace(/^#+\s*/, '').trim();
            } else if (l.startsWith('![封面') || l.startsWith('![图片') || l.startsWith('![')) {
                const m = l.match(/!\[.*?\]\((.*?)\)/);
                if (m && !imageUrl) imageUrl = m[1];
            } else if (l.includes('|') && l.includes('艺术家')) {
                const m = l.match(/\|\s*艺术家\s*\|\s*(.+?)\s*\|/);
                if (m) artist = m[1].trim();
            } else if (l.includes('|') && l.includes('作者')) {
                const m = l.match(/\|\s*作者\s*\|\s*(.+?)\s*\|/);
                if (m && !artist) artist = m[1].trim();
            } else if (l.includes('|') && l.includes('创作年份')) {
                const m = l.match(/\|\s*创作年份\s*\|\s*(.+?)\s*\|/);
                if (m) year = m[1].trim();
            } else if (l.includes('|') && l.includes('建成年份') && !year) {
                const m = l.match(/\|\s*建成年份\s*\|\s*(.+?)\s*\|/);
                if (m) year = m[1].trim();
            } else if (l.includes('|') && l.includes('拍卖价格')) {
                const m = l.match(/\|\s*拍卖价格\s*\|\s*(.+?)\s*\|/);
                if (m) extra = m[1].trim();
            } else if (l.includes('|') && l.includes('价格')) {
                const m = l.match(/\|\s*价格\s*\|\s*(.+?)\s*\|/);
                if (m && !extra) extra = m[1].trim();
            } else if (l.includes('|') && l.includes('成交价')) {
                const m = l.match(/\|\s*成交价\s*\|\s*(.+?)\s*\|/);
                if (m) extra = m[1].trim();
            } else if (!desc && l && !l.startsWith('##') && !l.startsWith('---') && 
                       !l.startsWith('|') && l.length > 20 && l.length < 120) {
                desc = l;
            }
        }
        return { title, artist, year, imageUrl, desc, extra };
    }
    
    // 生成卡片 HTML
    function buildCard(entity, index) {
        const rank = index + 1;
        const delay = Math.min(index * 0.06, 1.2);

        // 封面处理：支持 http/https 外链和相对路径本地图
        let coverContent;
        const imgUrl = entity.imageUrl;
        let resolvedImg = '';
        if (imgUrl && !imgUrl.includes('wikipedia.org/wiki/Special:')) {
            if (imgUrl.startsWith('http') || imgUrl.startsWith('//')) {
                resolvedImg = imgUrl;
            } else if (imgUrl && entity._mdDir) {
                // 相对路径：拼上 MD 文件所在目录
                resolvedImg = entity._mdDir + '/' + imgUrl;
            }
        }

        if (resolvedImg) {
            coverContent = `<img src="${resolvedImg}" alt="${entity.title || entity.name}" loading="lazy"
                onerror="this.parentElement.innerHTML='<div style=display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#2a1a3e);font-size:3rem;>🎨</div>'">`;
        } else {
            const displayName = entity.title || entity.name || '??';
            const initials = displayName.replace(/^\d+_/, '').substring(0, 2);
            coverContent = `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#2a1a3e,#1a1520);">
                <span style="font-size:3.5rem;">${initials}</span>
            </div>`;
        }
        
        const tags = [];
        if (entity.year) tags.push(`<span class="card-tag blue">${entity.year}</span>`);
        if (entity.extra) tags.push(`<span class="card-tag">${entity.extra}</span>`);
        
        const subParam = fullSubSlug;

        // 特殊实体：如果有自定义 HTML 页面，则链接到该页面
        let entityPageUrl;
        const entityFile = entity.file || '';
        if (entityFile === '01_nike_jdeMan.md') {
            // 妮可·基德曼的自定义精美网页
            entityPageUrl = buildMdPath(catSlug, subParam, '').replace(/[^/]+$/, '') + 'nicole-kidman.html';
        } else {
            entityPageUrl = buildEntityPageUrl(catSlug, subParam, entity.file);
        }

        return `
            <div class="gallery-card" style="animation-delay:${delay}s"
                 onclick="window.location.href='${entityPageUrl}'">
                <div class="card-hover-overlay">
                    <button class="card-view-btn">✦ 查看详情</button>
                </div>
                <div class="card-cover">
                    <div class="card-rank">${rank}</div>
                    ${coverContent}
                </div>
                <div class="card-body">
                    <h3 class="card-title">${entity.title || entity.name || '??'}</h3>
                    <div class="card-meta">
                        ${entity.artist ? `<span>👤 ${entity.artist}</span>` : ''}
                    </div>
                    ${entity.desc ? `<p class="card-desc">${entity.desc}</p>` : ''}
                    ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
                </div>
            </div>
        `;
    }
    
    function mergeEnriched(entity) {
        const cached = enrichCache.get(entity.file);
        if (!cached) return entity;
        return {
            ...entity,
            title: cached.title || entity.name,
            imageUrl: cached.imageUrl,
            artist: cached.artist,
            year: cached.year,
            desc: cached.desc,
            extra: cached.extra,
            _mdDir: cached._mdDir,
        };
    }

    // 渲染当前页网格
    function renderGrid(entities) {
        const grid = document.getElementById('entityGrid');
        const skeleton = document.getElementById('skeletonGrid');
        const empty = document.getElementById('emptyState');
        const countEl = document.getElementById('filteredCount');

        skeleton.style.display = 'none';
        countEl.textContent = entities.length;

        if (entities.length === 0) {
            grid.style.display = 'none';
            empty.style.display = 'block';
            renderPagination(0);
            return;
        }

        empty.style.display = 'none';
        grid.style.display = 'grid';

        const start = (currentPage - 1) * PAGE_SIZE;
        const pageItems = entities.slice(start, start + PAGE_SIZE);
        grid.innerHTML = pageItems.map((e, i) => buildCard(mergeEnriched(e), start + i)).join('');
        renderPagination(entities.length);

        // 加载当前页的 MD 富媒体（不阻塞渲染）
        enrichPage(pageItems, start);
    }

    // 渲染分页控件
    function renderPagination(total) {
        const container = document.getElementById('pagination');
        const totalPages = Math.ceil(total / PAGE_SIZE);

        if (totalPages <= 1) {
            container.style.display = 'none';
            return;
        }
        container.style.display = 'flex';

        const pages = [];
        // 始终显示首页、末页，当前页前后各2页
        const range = new Set([1, totalPages]);
        for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) range.add(i);
        const sorted = [...range].sort((a, b) => a - b);

        let html = '';
        // 上一页
        html += `<button class="page-btn${currentPage === 1 ? ' disabled' : ''}" onclick="goPage(${currentPage - 1})">‹</button>`;

        let prev = 0;
        for (const p of sorted) {
            if (prev && p - prev > 1) html += `<span class="page-ellipsis">…</span>`;
            html += `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goPage(${p})">${p}</button>`;
            prev = p;
        }

        // 下一页
        html += `<button class="page-btn${currentPage === totalPages ? ' disabled' : ''}" onclick="goPage(${currentPage + 1})">›</button>`;
        html += `<span class="page-info">${currentPage} / ${totalPages} 页 · 共 ${total} 条</span>`;

        container.innerHTML = html;
    }

    // 跳转页码
    function goPage(page) {
        const totalPages = Math.ceil(filteredEntities.length / PAGE_SIZE);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderGrid(filteredEntities);
        document.getElementById('rankingHeader').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 异步加载当前页 MD 富媒体，加载完后逐张更新卡片
    async function enrichPage(pageItems, startIndex) {
        const concurrency = 6;
        for (let i = 0; i < pageItems.length; i += concurrency) {
            const batch = pageItems.slice(i, i + concurrency);
            await Promise.all(batch.map(async (e, bi) => {
                if (enrichCache.has(e.file)) return;
                if (e.file === 'index.md' || e.file === 'INDEX.md') return;
                try {
                    const mdPath = buildMdPath(catSlug, childDirSlug ? `${subSlug}/${childDirSlug}` : subSlug, e.file);
                    const r = await fetch(mdPath);
                    if (!r.ok) return;
                    const text = await r.text();
                    const extracted = extractFromMd(text, e.file);
                    // 记录 MD 文件所在目录，供相对路径图片使用
                    extracted._mdDir = mdPath.substring(0, mdPath.lastIndexOf('/'));
                    enrichCache.set(e.file, extracted);
                    // 更新对应卡片
                    const cardIndex = startIndex + i + bi;
                    updateCard(e, cardIndex);
                } catch { /* 静默 */ }
            }));
        }
    }

    // 用富媒体数据原地更新单张卡片
    function updateCard(entity, index) {
        const grid = document.getElementById('entityGrid');
        const cards = grid.querySelectorAll('.gallery-card');
        const relIndex = index - (currentPage - 1) * PAGE_SIZE;
        if (relIndex < 0 || relIndex >= cards.length) return;
        const merged = mergeEnriched(entity);
        cards[relIndex].outerHTML = buildCard(merged, index);
    }
    
    // 页面加载
    document.addEventListener('DOMContentLoaded', async function() {
        const urlParams = new URLSearchParams(window.location.search);
        catSlug = urlParams.get('cat') || '';
        subSlug = decodeURIComponent(urlParams.get('sub') || '');
        
        if (!catSlug || !subSlug) {
            document.getElementById('skeletonGrid').style.display = 'none';
            document.getElementById('entityGrid').innerHTML = '<p style="color:#ff6b6b;text-align:center;grid-column:1/-1;padding:60px 0;">参数错误</p>';
            document.getElementById('entityGrid').style.display = 'grid';
            return;
        }
        
        // 直接加载 nav-tree.json（不依赖 script.js 全局变量）
        let navData = window.navTree || [];
        if (!navData.length) {
            try {
                const r = await fetch('data/nav-tree.json');
                if (r.ok) navData = await r.json();
            } catch(e) { /* 静默 */ }
        }
        
        // 找分类信息（首次查找，后续由子目录逻辑修正）
        let category = null, subcategory = null;
        const titleEl = document.getElementById('rankingTitle');
        const descEl = document.getElementById('rankingDesc');
        document.title = '典藏榜单 - 赛博方舟';
        if (navData.length) {
            category = navData.find(c => c.slug === catSlug);
            if (category) {
                subcategory = category.subcategories.find(s => s.slug === subSlug);
            }
        }
        
        // 判断是否为子目录路径（如 games/RPGgamesTop20）
        const isSubDirPath = subSlug.includes('/');
        const parentSubSlug = isSubDirPath ? subSlug.split('/')[0] : subSlug;
        childDirSlug = isSubDirPath ? subSlug.split('/').slice(1).join('/') : '';
        fullSubSlug = subSlug; // 保存完整路径，供 buildCard 使用

        // 将关键变量挂到 window，供全局函数 buildCard / renderGrid 访问
        window._cyberArk = window._cyberArk || {};
        window._cyberArk.catSlug = catSlug;
        window._cyberArk.subSlug = subSlug;
        window._cyberArk.childDirSlug = childDirSlug;

        // 如果是子目录路径，subSlug 修正为父级（用于查找 nav-tree 中的 subcategory）
        if (isSubDirPath) subSlug = parentSubSlug;
        
        // 重新查找 subcategory（修正后的 subSlug）
        if (navData.length) {
            category = navData.find(c => c.slug === catSlug);
            if (category) {
                subcategory = category.subcategories.find(s => s.slug === subSlug);
            }
        }
        
        // 更新页面标题和面包屑
        if (subcategory) {
            titleEl.textContent = childDirSlug ? childDirSlug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : subcategory.name;
            descEl.textContent = childDirSlug 
                ? `${subcategory.name} 的子榜单`
                : (subcategory.description || `收录 ${subcategory.entityCount || 0} 件珍贵典藏`);
            
            // 面包屑（三级）
            if (category) {
                const catEl = document.getElementById('breadcrumbCat');
                catEl.textContent = category.name;
                catEl.href = buildRankingsUrl(catSlug);

                const subEl = document.getElementById('breadcrumbSub');
                if (childDirSlug) {
                    // 三级面包屑：首页 / 分类 / 父子榜单 / 当前子榜单
                    subEl.innerHTML = `<a href="${buildEntityListUrl(catSlug, parentSubSlug)}" style="color:#00d4ff;text-decoration:none;">${subcategory.name}</a> <span style="margin:0 10px;">›</span> <a href="${buildEntityListUrl(catSlug, fullSubSlug)}" style="color:#00d4ff;text-decoration:none;">${childDirSlug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</a>`;
                } else {
                    subEl.textContent = subcategory.name;
                }
            }
        }
        
        // 加载实体列表
        let entities = [];
        if (childDirSlug) {
            // 子子分类模式：尝试加载 data/entities/{cat}/{parentSub}/{childDir}.json
            try {
                const nestedSubSlug = `${parentSubSlug}/${childDirSlug}`;
                let r = await fetch(buildEntitiesJsonPath(catSlug, nestedSubSlug));
                if (r.ok) { entities = await r.json(); }
                else {
                    r = await fetch(`data/entities/${catSlug}/${childDirSlug}.json`);
                    if (r.ok) entities = await r.json();
                }
            } catch(e) { /* 忽略 */ }
            // 如果还是空，尝试从父级 JSON 中按前缀过滤
            if (entities.length === 0) {
                try {
                    const r = await fetch(buildEntitiesJsonPath(catSlug, parentSubSlug));
                    if (r.ok) {
                        const parent = await r.json();
                        const prefix = childDirSlug + '/';
                        entities = parent.filter(e => e.file && e.file.startsWith(prefix));
                    }
                } catch(e) { /* 忽略 */ }
            }
        } else {
            try {
                const r = await fetch(buildEntitiesJsonPath(catSlug, subSlug));
                if (r.ok) entities = await r.json();
            } catch(e) { /* 忽略 */ }
        }
        
        filteredEntities = entities.filter(e => e.file && !e.file.endsWith('index.md') && !e.file.endsWith('INDEX.md'));
        allEntities = [...filteredEntities];
        document.getElementById('totalCount').textContent = filteredEntities.length;
        document.getElementById('filteredCount').textContent = filteredEntities.length;
        
        // ===== 检测子目录（子榜单）=====
        // 两种来源：(1) nav-tree 中的 subcategories（子子分类，如 medicine > pharmaceutical-companies）
        //         (2) 实体 file 路径中的子目录（hasSubDirs，如 games > RPGgamesTop20）
        const navSubSubs = (subcategory && subcategory.subcategories) ? subcategory.subcategories : [];
        const fileSubDirMap = new Map();
        if (subcategory && subcategory.hasSubDirs) {
            filteredEntities.forEach(e => {
                const parts = e.file.split('/');
                if (parts.length > 1) {
                    const dirName = parts[0];
                    if (!fileSubDirMap.has(dirName)) fileSubDirMap.set(dirName, []);
                    fileSubDirMap.get(dirName).push(e);
                }
            });
        }
        
        // 合并所有子榜单来源
        const allSubRankings = [];
        // 来源1: nav-tree 子子分类
        navSubSubs.forEach(ss => {
            allSubRankings.push({ slug: ss.slug, name: ss.name, count: ss.entityCount || 0, source: 'nav' });
        });
        // 来源2: 文件子目录
        fileSubDirMap.forEach((ents, slug) => {
            if (!allSubRankings.find(r => r.slug === slug)) {
                const dirTitle = slug
                    .replace(/Top\d+/i, m => ' Top' + m.replace(/[^0-9]/g, ''))
                    .replace(/-/g, ' ')
                    .replace(/\b\w/g, c => c.toUpperCase());
                allSubRankings.push({ slug, name: dirTitle, count: ents.length, source: 'file' });
            }
        });
        
        // 当前已在子榜单视图（childDirSlug 非空），直接渲染实体列表，不再显示子榜单卡片
        if (!childDirSlug && allSubRankings.length > 0) {
            // 有子榜单且当前不在子榜单视图 → 显示子榜单卡片列表
            document.getElementById('skeletonGrid').style.display = 'none';
            const grid = document.getElementById('entityGrid');
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(320px, 1fr))';
            
            const catColor = category ? category.color : '#00d4ff';
            allSubRankings.sort((a, b) => b.count - a.count);
            
            grid.innerHTML = allSubRankings.map((sr, idx) => {
                const delay = idx * 0.05;
                const title = sr.name || sr.slug;
                const icon = sr.source === 'nav' ? '📋' : '📂';
                return `
                    <div class="gallery-card" style="animation-delay:${delay}s; cursor:pointer;"
                         onclick="window.location.href='${buildEntityListUrl(catSlug, subSlug + '/' + sr.slug)}'">
                        <div class="card-cover" style="aspect-ratio:2/1;background:linear-gradient(135deg,#1a1a2e ${catColor}15,#0d0d1a);">
                            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;">
                                <span style="font-size:3rem;">${icon}</span>
                                <span style="font-size:0.9rem;color:#808080;">子榜单</span>
                            </div>
                        </div>
                        <div class="card-body">
                            <h3 class="card-title" style="font-size:1.15rem;">${title}</h3>
                            <div class="card-meta">
                                <span style="color:#c9a84c;font-weight:600;">${sr.count} 个实体</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelector('.search-area').style.display = 'none';
            descEl.textContent = `包含 ${allSubRankings.length} 个子榜单，共 ${filteredEntities.length} 个实体`;
            return;
        }
        
        // ===== 无子目录或只有一个子目录：正常渲染实体列表 =====
        // 直接渲染第一页（不等待 MD 加载）
        currentPage = 1;
        renderGrid(filteredEntities);

        // 本地搜索
        const searchInput = document.getElementById('localSearch');
        searchInput.addEventListener('input', function() {
            const q = this.value.toLowerCase().trim();
            currentPage = 1;
            if (!q) {
                filteredEntities = [...allEntities];
            } else {
                filteredEntities = allEntities.filter(e => {
                    const cached = enrichCache.get(e.file);
                    const title = (cached && cached.title) || e.name || '';
                    const artist = (cached && cached.artist) || '';
                    return title.toLowerCase().includes(q) ||
                           artist.toLowerCase().includes(q) ||
                           (e.file || '').toLowerCase().includes(q);
                });
            }
            renderGrid(filteredEntities);
        });
    });
    </script>
