<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实体详情 - 赛博方舟</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particleCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></canvas>
    
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🏛️</span>
                    <span class="logo-text">赛博方舟</span>
                    <span class="logo-divider">|</span>
                    <span class="logo-en">Cyber Ark</span>
                </a>
            </div>
            
            <div class="nav-center">
                <div class="search-box">
                    <input type="text" placeholder="搜索文明瑰宝..." id="globalSearch">
                    <button class="search-btn" onclick="performSearch()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="nav-right">
                <button class="nav-btn" onclick="toggleDarkMode()" title="暗黑模式切换">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button class="nav-btn" onclick="showFavorites()" title="收藏夹">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </button>
                <button class="nav-btn" onclick="showAbout()" title="关于本站">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- 实体详情区 -->
    <section class="entity-detail-page" style="padding: 120px 2rem 80px; min-height: calc(100vh - 200px);">
        <div class="container" style="max-width: 1200px; margin: 0 auto;">
            <!-- 面包屑导航 -->
            <div class="breadcrumb" style="margin-bottom: 30px; color: #9090a0; font-size: 14px;">
                <a href="index.html" style="color: #00d4ff; text-decoration: none;">首页</a>
                <span style="margin: 0 10px;">/</span>
                <a id="breadcrumbCategory" href="#" style="color: #00d4ff; text-decoration: none;">加载中...</a>
                <span style="margin: 0 10px;">/</span>
                <a id="breadcrumbRanking" href="#" style="color: #00d4ff; text-decoration: none;">加载中...</a>
                <span style="margin: 0 10px;">/</span>
                <span id="breadcrumbEntity">加载中...</span>
            </div>
            
            <div id="entityDetail">
                <!-- 实体详情将通过 JavaScript 动态渲染 -->
                <p style="color: #9090a0; text-align: center; padding: 100px 0;">加载中...</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-top">
                <div class="footer-brand">
                    <h3>🏛️ 赛博方舟 | Cyber Ark</h3>
                    <p>人类顶级文明数字载体</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 赛博方舟 Cyber Ark. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script src="script.js"></script>
    <script>
    // 实体详情页面逻辑
    let navTree = [];
    
    async function loadNavTree() {
        try {
            const response = await fetch('data/nav-tree.json');
            navTree = await response.json();
            renderEntityDetailPage();
        } catch (error) {
            console.error('加载数据失败:', error);
            document.getElementById('entityDetail').innerHTML = '<p style="color:#ff6b6b;text-align:center;">加载数据失败</p>';
        }
    }
    
    function renderEntityDetailPage() {
        const urlParams = new URLSearchParams(window.location.search);
        const catSlug = urlParams.get('cat');
        const subSlug = urlParams.get('sub');
        const entityFile = urlParams.get('entity');
        
        if (!catSlug || !entityFile) {
            document.getElementById('entityDetail').innerHTML = '<p style="color:#ff6b6b;text-align:center;">参数错误</p>';
            return;
        }
        
        // 查找分类和榜单信息
        const category = navTree.find(c => c.slug === catSlug);
        if (!category) {
            document.getElementById('entityDetail').innerHTML = '<p style="color:#ff6b6b;text-align:center;">分类不存在</p>';
            return;
        }
        
        let subcategory = null;
        if (subSlug) {
            subcategory = category.subcategories.find(s => s.slug === subSlug);
        }
        
        // 从文件名提取实体名称
        const entityName = entityFile.replace('.md', '');
        
        // 更新页面标题
        document.title = `${entityName} - 赛博方舟`;
        
        // 更新面包屑
        document.getElementById('breadcrumbCategory').textContent = category.name;
        document.getElementById('breadcrumbCategory').href = `rankings.html?cat=${catSlug}`;
        
        if (subcategory) {
            document.getElementById('breadcrumbRanking').textContent = subcategory.name;
            document.getElementById('breadcrumbRanking').href = `entity-list.html?cat=${catSlug}&sub=${subSlug}`;
        } else {
            document.getElementById('breadcrumbRanking').textContent = '未知榜单';
        }
        
        document.getElementById('breadcrumbEntity').textContent = entityName;
        
        const detail = document.getElementById('entityDetail');
        
        // 渲染详情页（暂时不解析 md 文件）
        detail.innerHTML = `
            <div class="entity-detail-header" style="
                display: flex;
                gap: 40px;
                margin-bottom: 50px;
                background: rgba(15,15,25,0.95);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(0,212,255,0.2);
                border-radius: 20px;
                padding: 40px;
                flex-wrap: wrap;
            ">
                <div class="entity-detail-thumbnail" style="
                    font-size: 6rem;
                    text-align: center;
                    min-width: 150px;
                ">📄</div>
                <div class="entity-detail-info" style="flex: 1; min-width: 300px;">
                    <h2 class="entity-detail-name" style="
                        font-size: 2.5rem;
                        background: linear-gradient(135deg, #00d4ff, #c9a84c);
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                        margin-bottom: 15px;
                        word-break: break-word;
                    ">${entityName}</h2>
                    <div class="entity-detail-meta" style="
                        display: flex;
                        gap: 20px;
                        margin-bottom: 20px;
                        color: #9090a0;
                        font-size: 14px;
                        flex-wrap: wrap;
                    ">
                        <span class="meta-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 5px;">
                                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                            </svg>
                            ${category.name} ${category.icon}
                        </span>
                        ${subcategory ? `
                        <span class="meta-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 5px;">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            </svg>
                            ${subcategory.name}
                        </span>
                        ` : ''}
                    </div>
                    <div class="entity-file-info" style="
                        background: rgba(0,212,255,0.1);
                        padding: 12px 16px;
                        border-radius: 8px;
                        margin-bottom: 20px;
                    ">
                        <span style="color: #9090a0; font-size: 13px;">文件名: </span>
                        <code style="color: #00d4ff; font-size: 13px;">${entityFile}</code>
                    </div>
                    <div class="entity-detail-actions" style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <button class="btn-primary" onclick="alert('收藏功能开发中')" style="
                            padding: 10px 25px;
                            border: none;
                            border-radius: 8px;
                            background: linear-gradient(135deg, #00d4ff, #0099cc);
                            color: #0a0a0f;
                            font-weight: 600;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            gap: 8px;
                            transition: all 0.3s ease;
                        ">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            收藏
                        </button>
                        <button class="btn-secondary" onclick="alert('分享功能开发中')" style="
                            padding: 10px 25px;
                            border: 1px solid rgba(0,212,255,0.3);
                            border-radius: 8px;
                            background: transparent;
                            color: #00d4ff;
                            font-weight: 600;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            gap: 8px;
                            transition: all 0.3s ease;
                        ">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="18" cy="5" r="3"></circle>
                                <circle cx="6" cy="12" r="3"></circle>
                                <circle cx="18" cy="19" r="3"></circle>
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                            </svg>
                            分享
                        </button>
                    </div>
                </div>
            </div>
            <div class="entity-detail-body" style="
                background: rgba(15,15,25,0.95);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(0,212,255,0.2);
                border-radius: 20px;
                padding: 40px;
            ">
                <h3 style="
                    color: #e0e0f6;
                    font-size: 1.8rem;
                    margin-bottom: 20px;
                    background: linear-gradient(135deg, #00d4ff, #c9a84c);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                ">📝 内容预览</h3>
                <p style="color: #a0a0b5; font-size: 16px; line-height: 1.8; margin-bottom: 20px;">
                    这是 <strong style="color: #00d4ff;">${entityName}</strong> 的实体详情页面。
                </p>
                <p style="color: #9090a0; font-size: 14px; line-height: 1.8; margin-bottom: 30px;">
                    完整版本将包含：
                </p>
                <ul style="color: #a0a0b5; font-size: 14px; line-height: 1.8; margin-bottom: 30px; padding-left: 20px;">
                    <li>📄 Markdown 文件解析与渲染</li>
                    <li>📚 完整的背景介绍与详细内容</li>
                    <li>🖼️ 图片、表格等多媒体展示</li>
                    <li>🔗 相关实体推荐</li>
                    <li>💬 用户评论与互动</li>
                </ul>
                <div style="
                    background: rgba(201,168,76,0.1);
                    border: 1px solid rgba(201,168,76,0.3);
                    border-radius: 12px;
                    padding: 20px;
                    margin-top: 20px;
                ">
                    <p style="color: #c9a84c; font-size: 14px; margin: 0;">
                        💡 <strong>提示:</strong> 该实体来源于 ${category.name} 分类下的 ${subcategory ? subcategory.name : '未知榜单'}。
                    </p>
                </div>
            </div>
        `;
    }
    
    // 页面加载完成后渲染
    document.addEventListener('DOMContentLoaded', loadNavTree);
    </script>
</body>
</html>
