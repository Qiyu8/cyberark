<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实体详情 - 赛博方舟</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown 渲染样式 */
        .md-content { color: #e0e0f6; line-height: 1.9; font-size: 16px; }
        .md-content h1 { font-size: 2.2rem; background: linear-gradient(135deg, #00d4ff, #c9a84c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 25px 0; padding-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); }
        .md-content h2 { font-size: 1.6rem; color: #00d4ff; margin: 35px 0 15px 0; padding-bottom: 8px; border-bottom: 1px solid rgba(0,212,255,0.15); }
        .md-content h3 { font-size: 1.3rem; color: #c9a84c; margin: 25px 0 12px 0; }
        .md-content h4 { font-size: 1.1rem; color: #a0a0b5; margin: 20px 0 10px 0; }
        .md-content p { margin: 12px 0; color: #d0d0e6; }
        .md-content strong { color: #00d4ff; font-weight: 600; }
        .md-content em { color: #c9a84c; font-style: italic; }
        .md-content a { color: #00d4ff; text-decoration: none; border-bottom: 1px dashed rgba(0,212,255,0.4); transition: all 0.2s; }
        .md-content a:hover { color: #c9a84c; border-bottom-color: #c9a84c; }
        .md-content ul, .md-content ol { margin: 12px 0; padding-left: 25px; }
        .md-content li { margin: 6px 0; color: #d0d0e6; }
        .md-content li::marker { color: #00d4ff; }
        .md-content blockquote { border-left: 3px solid #c9a84c; margin: 20px 0; padding: 10px 20px; background: rgba(201,168,76,0.08); border-radius: 0 8px 8px 0; }
        .md-content blockquote p { color: #c9a84c; margin: 5px 0; }
        .md-content code { background: rgba(0,212,255,0.1); color: #00d4ff; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        .md-content pre { background: rgba(10,10,20,0.9); border: 1px solid rgba(0,212,255,0.2); border-radius: 10px; padding: 20px; overflow-x: auto; margin: 15px 0; }
        .md-content pre code { background: none; padding: 0; color: #e0e0f6; }
        .md-content img { max-width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(0,212,255,0.2); }
        .md-content table { width: 100%; border-collapse: collapse; margin: 20px 0; background: rgba(15,15,25,0.6); border-radius: 10px; overflow: hidden; }
        .md-content thead { background: rgba(0,212,255,0.1); }
        .md-content th { padding: 12px 16px; text-align: left; color: #00d4ff; font-weight: 600; border-bottom: 2px solid rgba(0,212,255,0.2); }
        .md-content td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #d0d0e6; }
        .md-content tr:hover td { background: rgba(0,212,255,0.05); }
        .md-content hr { border: none; border-top: 1px solid rgba(0,212,255,0.15); margin: 30px 0; }
        
        /* 上下实体导航 */
        .entity-nav { display: flex; justify-content: space-between; margin-top: 40px; gap: 15px; flex-wrap: wrap; }
        .entity-nav a { 
            display: flex; align-items: center; gap: 10px; padding: 15px 25px;
            background: rgba(15,15,25,0.95); border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px; color: #00d4ff; text-decoration: none;
            transition: all 0.3s ease; flex: 1; min-width: 200px;
        }
        .entity-nav a:hover { border-color: #00d4ff; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,212,255,0.2); }
        .entity-nav a.next { text-align: right; justify-content: flex-end; }
        .entity-nav .nav-label { font-size: 12px; color: #9090a0; }
        .entity-nav .nav-title { font-size: 15px; color: #e0e0f6; }
        
        /* 加载动画 */
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
        .loading-dots span { animation: pulse 1.4s ease-in-out infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <canvas id="particleCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></canvas>
    
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🏛️</span>
                    <span class="logo-text">赛博方舟</span>
                    <span class="logo-divider">|</span>
                    <span class="logo-en">Cyber Ark</span>
                </a>
            </div>
            <div class="nav-center">
                <div class="search-box">
                    <input type="text" placeholder="搜索文明瑰宝..." id="globalSearch">
                    <button class="search-btn" onclick="performSearch()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                    </button>
                </div>
            </div>
            <div class="nav-right">
                <button class="nav-btn" onclick="toggleDarkMode()" title="暗黑模式切换">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="nav-btn" onclick="showFavorites()" title="收藏夹">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                </button>
                <button class="nav-btn" onclick="showAbout()" title="关于本站">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </button>
            </div>
        </div>
    </nav>

    <section class="entity-detail-page" style="padding: 120px 2rem 80px; min-height: calc(100vh - 200px);">
        <div class="container" style="max-width: 1000px; margin: 0 auto;">
            <!-- 面包屑 -->
            <div class="breadcrumb" style="margin-bottom: 30px; color: #9090a0; font-size: 14px;">
                <a href="index.html" style="color: #00d4ff; text-decoration: none;">首页</a>
                <span style="margin: 0 10px;">/</span>
                <a id="breadcrumbCategory" href="#" style="color: #00d4ff; text-decoration: none;">加载中...</a>
                <span style="margin: 0 10px;">/</span>
                <a id="breadcrumbRanking" href="#" style="color: #00d4ff; text-decoration: none;">加载中...</a>
                <span style="margin: 0 10px;">/</span>
                <span id="breadcrumbEntity">加载中...</span>
            </div>
            
            <div id="entityDetail" style="
                background: rgba(15,15,25,0.95);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(0,212,255,0.2);
                border-radius: 20px;
                padding: 40px;
            ">
                <div class="loading-dots" style="text-align:center; padding:60px 0; color:#9090a0; font-size:18px;">
                    <span>●</span> <span>●</span> <span>●</span>
                </div>
            </div>
            
            <!-- 上下实体导航 -->
            <div id="entityNav" class="entity-nav" style="display:none;"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-top">
                <div class="footer-brand">
                    <h3>🏛️ 赛博方舟 | Cyber Ark</h3>
                    <p>人类顶级文明数字载体，典藏全球高价值资产</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 赛博方舟 Cyber Ark. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script src="pathUtils.js"></script>
    <script src="script.js"></script>
    <script>
    // 实体详情页 - 加载并渲染 Markdown 内容
    let entityData = null; // 当前榜单的实体列表
    let currentEntityIndex = -1;
    
    document.addEventListener('DOMContentLoaded', async function() {
        // 等待全局 navTree 就绪
        let waited = 0;
        while ((!navTree || navTree.length === 0) && waited < 5000) {
            await new Promise(r => setTimeout(r, 100));
            waited += 100;
        }
        if (!navTree || navTree.length === 0) {
            try {
                const r = await fetch('data/nav-tree.json');
                navTree = await r.json();
            } catch(e) {
                document.getElementById('entityDetail').innerHTML = '<p style="color:#ff6b6b;text-align:center;">数据加载失败</p>';
                return;
            }
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const catSlug = urlParams.get('cat');
        const subSlug = urlParams.get('sub');
        const entityFile = urlParams.get('entity');

        if (!catSlug || !subSlug || !entityFile) {
            document.getElementById('entityDetail').innerHTML = '<p style="color:#ff6b6b;text-align:center;">参数错误：缺少 cat/sub/entity</p>';
            return;
        }

        // 检测是否存在专属 HTML 详情页，存在则直接跳转
        const mdPath = buildMdPath(catSlug, subSlug, entityFile);
        const htmlPath = mdPath.replace(/\.md$/, '.html');
        try {
            const probe = await fetch(htmlPath, { method: 'HEAD' });
            if (probe.ok) {
                window.location.replace(htmlPath);
                return;
            }
        } catch(e) { /* 无专属页，继续正常渲染 */ }
        
        // 解析子子分类路径（如 medicine/Century-Pharmaceutical-Companies-Top50）
        const isSubSub = subSlug.includes('/');
        const parentSubSlug = isSubSub ? subSlug.split('/')[0] : subSlug;
        const childSlug = isSubSub ? subSlug.split('/').slice(1).join('/') : '';
        
        // 查找分类和榜单
        const category = navTree.find(c => c.slug === catSlug);
        const subcategory = category ? category.subcategories.find(s => s.slug === parentSubSlug) : null;
        
        // 更新面包屑
        if (category) {
            document.getElementById('breadcrumbCategory').textContent = category.name;
            document.getElementById('breadcrumbCategory').href = buildRankingsUrl(catSlug);
        }
        if (subcategory) {
            const rankingEl = document.getElementById('breadcrumbRanking');
            if (isSubSub) {
                // 三级面包屑
                rankingEl.innerHTML = `<a href="${buildEntityListUrl(catSlug, parentSubSlug)}" style="color:#00d4ff;text-decoration:none;">${subcategory.name}</a> › <a href="${buildEntityListUrl(catSlug, subSlug)}" style="color:#00d4ff;text-decoration:none;">${childSlug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</a>`;
            } else {
                rankingEl.textContent = subcategory.name;
                rankingEl.href = buildEntityListUrl(catSlug, subSlug);
            }
        }
        
        // 加载实体列表（用于上下导航）
        try {
            let idxResp = await fetch(buildEntitiesJsonPath(catSlug, subSlug, entityFile));
            if (!idxResp.ok && isSubSub) {
                idxResp = await fetch(buildEntitiesJsonPath(catSlug, parentSubSlug));
            }
            if (idxResp.ok) {
                entityData = await idxResp.json();
                currentEntityIndex = entityData.findIndex(e => e.file === entityFile);
            }
        } catch(e) { /* 忽略，导航功能可选 */ }
        
        // entityFile 可能包含子目录前缀，buildMdPath 统一处理
        const mdUrl = buildMdPath(catSlug, subSlug, entityFile);

        // 检测是否存在同名专属 HTML 页面，有则直接跳转
        const htmlUrl = mdUrl.replace(/\.md$/, '_page.html');
        try {
            const htmlCheck = await fetch(htmlUrl, { method: 'HEAD' });
            if (htmlCheck.ok) {
                window.location.replace(htmlUrl);
                return;
            }
        } catch(e) { /* 无专属页面，继续检测 media.json */ }

        // 检测是否存在 media.json，有则渲染富媒体页面
        const mediaJsonUrl = mdUrl.replace(/\.md$/, '_media.json');
        try {
            const mediaCheck = await fetch(mediaJsonUrl);
            if (mediaCheck.ok) {
                const mediaData = await mediaCheck.json();
                renderRichMediaPage(mediaData, catSlug, subSlug, entityFile);
                return;
            }
        } catch(e) { /* 无 media.json，继续渲染普通 MD */ }

        try {
            const mdResp = await fetch(mdUrl);
            if (!mdResp.ok) throw new Error(`HTTP ${mdResp.status}`);
            const mdText = await mdResp.text();
            
            // 用 marked 渲染
            const htmlContent = marked.parse(mdText);
            document.getElementById('entityDetail').innerHTML = `<div class="md-content">${htmlContent}</div>`;
            
            // 提取 h1 作为页面标题和面包屑
            const h1 = document.querySelector('.md-content h1');
            const entityName = h1 ? h1.textContent : entityFile.replace('.md', '');
            document.title = `${entityName} - 赛博方舟`;
            document.getElementById('breadcrumbEntity').textContent = entityName;
            
            // 渲染上下导航
            renderEntityNav(catSlug, subSlug, entityFile);
        } catch(error) {
            console.error('加载 Markdown 失败:', error);
            document.getElementById('entityDetail').innerHTML = `
                <div style="text-align:center; padding:60px 0;">
                    <p style="font-size:4rem; margin-bottom:20px;">📄</p>
                    <h2 style="color:#e0e0f6; margin-bottom:15px;">${entityFile.replace('.md','')}</h2>
                    <p style="color:#9090a0;">Markdown 内容加载失败</p>
                    <p style="color:#606070; font-size:13px; margin-top:10px;">${error.message}</p>
                </div>
            `;
            document.getElementById('breadcrumbEntity').textContent = entityFile.replace('.md', '');
        }
    });

    function renderRichMediaPage(data, catSlug, subSlug, entityFile) {
        const theme = data.theme || { primaryColor: '#c9a84c', secondaryColor: '#8b0000', accentColor: '#ffd700' };

        // 更新页面标题和面包屑
        document.title = `${data.name} | ${data.title} - 赛博方舟`;
        document.getElementById('breadcrumbEntity').textContent = data.name;

        // 构建富媒体页面 HTML
        let html = `
            <style>
                .rich-media-page { max-width: 1400px; margin: 0 auto; }
                .rich-hero { text-align: center; padding: 40px 0; }
                .rich-hero-title { font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, ${theme.primaryColor}, ${theme.accentColor}); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
                .rich-hero-subtitle { font-size: 1.3rem; color: ${theme.secondaryColor}; margin-bottom: 15px; }
                .rich-hero-en { font-size: 1.5rem; color: #606070; font-style: italic; }

                .rich-main-visual { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin: 40px 0; align-items: center; }
                .rich-avatar-frame { border-radius: 20px; overflow: hidden; border: 3px solid ${theme.primaryColor}; box-shadow: 0 20px 60px rgba(201, 168, 76, 0.3); }
                .rich-avatar-frame img { width: 100%; height: auto; display: block; }

                .rich-info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
                .rich-info-item { background: rgba(15, 15, 25, 0.8); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 12px; padding: 12px 15px; }
                .rich-info-label { font-size: 0.8rem; color: #808090; margin-bottom: 3px; }
                .rich-info-value { font-size: 1rem; color: ${theme.primaryColor}; font-weight: 600; }

                .rich-section { margin: 60px 0; }
                .rich-section-title { font-size: 2rem; text-align: center; margin-bottom: 30px; color: ${theme.primaryColor}; position: relative; }
                .rich-section-title::after { content: ''; display: block; width: 80px; height: 2px; background: ${theme.primaryColor}; margin: 10px auto 0; }

                .rich-timeline { position: relative; padding: 20px 0; }
                .rich-timeline::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, transparent, ${theme.primaryColor}, transparent); }
                .rich-timeline-item { position: relative; margin-bottom: 40px; display: flex; align-items: center; }
                .rich-timeline-item:nth-child(odd) { flex-direction: row; }
                .rich-timeline-item:nth-child(even) { flex-direction: row-reverse; }
                .rich-timeline-content { width: 45%; background: rgba(15, 15, 25, 0.9); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 12px; padding: 20px; }
                .rich-timeline-year { position: absolute; left: 50%; transform: translateX(-50%); background: ${theme.secondaryColor}; color: ${theme.accentColor}; padding: 6px 15px; border-radius: 15px; font-weight: 700; }
                .rich-timeline-title { font-size: 1.1rem; color: ${theme.primaryColor}; margin-bottom: 8px; }
                .rich-timeline-desc { color: #b0b0c0; line-height: 1.5; font-size: 0.9rem; }

                .rich-film-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
                .rich-film-card { background: rgba(15, 15, 25, 0.9); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 12px; padding: 18px; transition: all 0.3s; cursor: pointer; }
                .rich-film-card:hover { transform: translateY(-5px); border-color: ${theme.primaryColor}; box-shadow: 0 10px 30px rgba(201, 168, 76, 0.3); }
                .rich-film-year { color: ${theme.secondaryColor}; font-weight: 700; font-size: 0.85rem; margin-bottom: 6px; }
                .rich-film-title { font-size: 1.1rem; color: ${theme.primaryColor}; margin-bottom: 4px; }
                .rich-film-title-en { font-size: 0.85rem; color: #808090; font-style: italic; margin-bottom: 8px; }
                .rich-film-role { color: #b0b0c0; margin-bottom: 8px; font-size: 0.9rem; }
                .rich-film-rating { display: inline-block; background: rgba(201, 168, 76, 0.2); color: ${theme.accentColor}; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }

                .rich-quotes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
                .rich-quote-card { background: rgba(15, 15, 25, 0.9); border-left: 3px solid ${theme.primaryColor}; border-radius: 8px; padding: 20px; position: relative; }
                .rich-quote-card::before { content: '"'; position: absolute; top: 5px; left: 10px; font-size: 3rem; color: ${theme.primaryColor}; opacity: 0.2; font-family: serif; }
                .rich-quote-text { font-size: 1rem; line-height: 1.7; color: #d0d0e6; font-style: italic; position: relative; z-index: 1; }

                .rich-achievements-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }
                .rich-achievement-card { background: rgba(15, 15, 25, 0.9); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 12px; padding: 25px; text-align: center; transition: all 0.3s; }
                .rich-achievement-card:hover { transform: scale(1.05); border-color: ${theme.primaryColor}; box-shadow: 0 10px 40px rgba(201, 168, 76, 0.3); }
                .rich-achievement-icon { font-size: 2.5rem; margin-bottom: 12px; }
                .rich-achievement-title { font-size: 1.1rem; color: ${theme.primaryColor}; margin-bottom: 8px; font-weight: 700; }
                .rich-achievement-desc { color: #b0b0c0; line-height: 1.5; font-size: 0.85rem; }

                @media (max-width: 768px) {
                    .rich-main-visual { grid-template-columns: 1fr; }
                    .rich-info-grid { grid-template-columns: 1fr; }
                    .rich-timeline::before { left: 20px; }
                    .rich-timeline-item { flex-direction: column !important; align-items: flex-start; }
                    .rich-timeline-content { width: 100%; margin-left: 40px; }
                    .rich-timeline-year { left: 20px; transform: none; }
                }
            </style>

            <div class="rich-media-page">
                <div class="rich-hero">
                    <h1 class="rich-hero-title">${data.name}</h1>
                    <p class="rich-hero-subtitle">${data.title}</p>
                    <p class="rich-hero-en">${data.nameEn}</p>
                </div>

                <div class="rich-main-visual">
                    <div class="rich-avatar-frame">
                        <img src="${data.avatar}" alt="${data.name}">
                    </div>
                    <div>
                        <div class="rich-info-grid">
        `;

        // 基本信息
        const labelMap = {
            birthDate: '出生日期', birthPlace: '出生地', nationality: '国籍',
            occupation: '职业', height: '身高', awards: '主要奖项'
        };
        for (const [key, value] of Object.entries(data.basicInfo)) {
            const label = labelMap[key] || key;
            const val = Array.isArray(value) ? value.join(' · ') : value;
            html += `
                            <div class="rich-info-item">
                                <div class="rich-info-label">${label}</div>
                                <div class="rich-info-value">${val}</div>
                            </div>`;
        }

        html += `
                        </div>
                    </div>
                </div>
        `;

        // 时间线
        if (data.timeline && data.timeline.length > 0) {
            html += `
                <div class="rich-section">
                    <h2 class="rich-section-title">生平履历</h2>
                    <div class="rich-timeline">`;

            data.timeline.forEach(item => {
                html += `
                        <div class="rich-timeline-item">
                            <div class="rich-timeline-content">
                                <h3 class="rich-timeline-title">${item.title}</h3>
                                <p class="rich-timeline-desc">${item.description}</p>
                            </div>
                            <div class="rich-timeline-year">${item.year}</div>
                        </div>`;
            });

            html += `
                    </div>
                </div>`;
        }

        // 作品集
        if (data.filmography && data.filmography.length > 0) {
            html += `
                <div class="rich-section">
                    <h2 class="rich-section-title">代表作品</h2>
                    <div class="rich-film-grid">`;

            data.filmography.forEach(film => {
                const awards = film.awards ? '<br><small style="color: #ffd700;">🏆 ' + film.awards.join(' · ') + '</small>' : '';
                const rating = film.rating ? `<span class="rich-film-rating">⭐ ${film.rating}</span>` : '';
                const boxOffice = film.boxOffice ? `<span class="rich-film-rating" style="margin-left: 8px;">💰 ${film.boxOffice}</span>` : '';

                html += `
                        <div class="rich-film-card">
                            <div class="rich-film-year">${film.year}</div>
                            <div class="rich-film-title">${film.title}</div>
                            <div class="rich-film-title-en">${film.titleEn}</div>
                            <div class="rich-film-role">饰演：${film.role}</div>
                            ${rating}${boxOffice}${awards}
                        </div>`;
            });

            html += `
                    </div>
                </div>`;
        }

        // 成就
        if (data.achievements && data.achievements.length > 0) {
            html += `
                <div class="rich-section">
                    <h2 class="rich-section-title">主要成就</h2>
                    <div class="rich-achievements-grid">`;

            data.achievements.forEach(achievement => {
                html += `
                        <div class="rich-achievement-card">
                            <div class="rich-achievement-icon">${achievement.icon}</div>
                            <h3 class="rich-achievement-title">${achievement.title}</h3>
                            <p class="rich-achievement-desc">${achievement.description}</p>
                        </div>`;
            });

            html += `
                    </div>
                </div>`;
        }

        // 语录
        if (data.quotes && data.quotes.length > 0) {
            html += `
                <div class="rich-section">
                    <h2 class="rich-section-title">经典语录</h2>
                    <div class="rich-quotes-grid">`;

            data.quotes.forEach(quote => {
                html += `
                        <div class="rich-quote-card">
                            <p class="rich-quote-text">${quote}</p>
                        </div>`;
            });

            html += `
                    </div>
                </div>`;
        }

        html += `
            </div>
        `;

        document.getElementById('entityDetail').innerHTML = html;

        // 渲染上下导航
        renderEntityNav(catSlug, subSlug, entityFile);
    }

    function renderEntityNav(catSlug, subSlug, currentFile) {
        if (!entityData || currentEntityIndex < 0) return;
        
        const nav = document.getElementById('entityNav');
        nav.style.display = 'flex';
        
        let prevHtml = '', nextHtml = '';
        
        if (currentEntityIndex > 0) {
            const prev = entityData[currentEntityIndex - 1];
            prevHtml = `<a href="${buildEntityPageUrl(catSlug, subSlug, prev.file)}" class="prev">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <div><div class="nav-label">上一个</div><div class="nav-title">${prev.name}</div></div>
            </a>`;
        } else {
            prevHtml = '<span></span>';
        }
        
        if (currentEntityIndex < entityData.length - 1) {
            const next = entityData[currentEntityIndex + 1];
            nextHtml = `<a href="${buildEntityPageUrl(catSlug, subSlug, next.file)}" class="next">
                <div style="text-align:right;"><div class="nav-label">下一个</div><div class="nav-title">${next.name}</div></div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>`;
        } else {
            nextHtml = '<span></span>';
        }
        
        nav.innerHTML = prevHtml + nextHtml;
    }
    </script>
</body>
</html>
