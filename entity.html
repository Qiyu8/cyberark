<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实体详情 - 赛博方舟</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown 渲染样式 */
        .md-content { color: #e0e0f6; line-height: 1.9; font-size: 16px; }
        .md-content h1 { font-size: 2.2rem; background: linear-gradient(135deg, #00d4ff, #c9a84c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 25px 0; padding-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); }
        .md-content h2 { font-size: 1.6rem; color: #00d4ff; margin: 35px 0 15px 0; padding-bottom: 8px; border-bottom: 1px solid rgba(0,212,255,0.15); }
        .md-content h3 { font-size: 1.3rem; color: #c9a84c; margin: 25px 0 12px 0; }
        .md-content h4 { font-size: 1.1rem; color: #a0a0b5; margin: 20px 0 10px 0; }
        .md-content p { margin: 12px 0; color: #d0d0e6; }
        .md-content strong { color: #00d4ff; font-weight: 600; }
        .md-content em { color: #c9a84c; font-style: italic; }
        .md-content a { color: #00d4ff; text-decoration: none; border-bottom: 1px dashed rgba(0,212,255,0.4); transition: all 0.2s; }
        .md-content a:hover { color: #c9a84c; border-bottom-color: #c9a84c; }
        .md-content ul, .md-content ol { margin: 12px 0; padding-left: 25px; }
        .md-content li { margin: 6px 0; color: #d0d0e6; }
        .md-content li::marker { color: #00d4ff; }
        .md-content blockquote { border-left: 3px solid #c9a84c; margin: 20px 0; padding: 10px 20px; background: rgba(201,168,76,0.08); border-radius: 0 8px 8px 0; }
        .md-content blockquote p { color: #c9a84c; margin: 5px 0; }
        .md-content code { background: rgba(0,212,255,0.1); color: #00d4ff; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        .md-content pre { background: rgba(10,10,20,0.9); border: 1px solid rgba(0,212,255,0.2); border-radius: 10px; padding: 20px; overflow-x: auto; margin: 15px 0; }
        .md-content pre code { background: none; padding: 0; color: #e0e0f6; }
        .md-content img { max-width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(0,212,255,0.2); }
        .md-content table { width: 100%; border-collapse: collapse; margin: 20px 0; background: rgba(15,15,25,0.6); border-radius: 10px; overflow: hidden; }
        .md-content thead { background: rgba(0,212,255,0.1); }
        .md-content th { padding: 12px 16px; text-align: left; color: #00d4ff; font-weight: 600; border-bottom: 2px solid rgba(0,212,255,0.2); }
        .md-content td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #d0d0e6; }
        .md-content tr:hover td { background: rgba(0,212,255,0.05); }
        .md-content hr { border: none; border-top: 1px solid rgba(0,212,255,0.15); margin: 30px 0; }
        
        /* 图片画廊 */
        .image-gallery { margin: 40px 0; }
        .gallery-title { font-size: 1.6rem; color: #00d4ff; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,212,255,0.15); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { 
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(0,212,255,0.2);
            transition: all 0.3s ease;
            aspect-ratio: 1;
            background: rgba(15,15,25,0.8);
        }
        .gallery-item:hover { 
            border-color: #00d4ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,212,255,0.3);
        }
        .gallery-item img { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-item-caption {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #e0e0f6;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .gallery-item:hover .gallery-item-caption { opacity: 1; }
        
        /* 灯箱 */
        .lightbox {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .lightbox.active { display: flex; }
        .lightbox-content {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .lightbox-content img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            display: block;
        }
        .lightbox-close {
            position: absolute;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.2); }
        .lightbox-prev, .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.2); }
        .lightbox-caption {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #e0e0f6;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            max-width: 80%;
            text-align: center;
        }
        
        /* 上下实体导航 */
        .entity-nav { display: flex; justify-content: space-between; margin-top: 40px; gap: 15px; flex-wrap: wrap; }
        .entity-nav a { 
            display: flex; align-items: center; gap: 10px; padding: 15px 25px;
            background: rgba(15,15,25,0.95); border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px; color: #00d4ff; text-decoration: none;
            transition: all 0.3s ease; flex: 1; min-width: 200px;
        }
        .entity-nav a:hover { border-color: #00d4ff; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,212,255,0.2); }
        .entity-nav a.next { text-align: right; justify-content: flex-end; }
        .entity-nav .nav-label { font-size: 12px; color: #9090a0; }
        .entity-nav .nav-title { font-size: 15px; color: #e0e0f6; }
        
        /* 加载动画 */
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
        .loading-dots span { animation: pulse 1.4s ease-in-out infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <canvas id="particleCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></canvas>
    
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🏛️</span>
                    <span class="logo-text">赛博方舟</span>
                    <span class="logo-divider">|</span>
                    <span class="logo-en">Cyber Ark</span>
                </a>
            </div>
            <div class="nav-center">
                <div class="search-box">
                    <input type="text" placeholder="搜索文明瑰宝..." id="globalSearch">
                    <button class="search-btn" onclick="performSearch()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                    </button>

            <div class="nav-right">
                <button class="nav-btn" onclick="toggleDarkMode()" title="暗黑模式切换">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="nav-btn" onclick="showFavorites()" title="收藏夹">

                </button>
                <button class="nav-btn" onclick="showAbout()" title="关于本站">

                </button>
            </div>

    </nav>

    <section class="entity-detail-page" style="padding: 120px 2rem 80px; min-height: calc(100vh - 200px);">
        <div class="container" style="max-width: 1000px; margin: 0 auto;">
            <!-- 面包屑 -->
            <div class="breadcrumb" style="margin-bottom: 30px; color: #9090a0; font-size: 14px;">
                <a href="index.html" style="color: #00d4ff; text-decoration: none;">首页</a>
                <span style="margin: 0 10px;">/</span>
                <a id="breadcrumbCategory" href="#" style="color: #00d4ff; text-decoration: none;">加载中...</a>
                <span style="margin: 0 10px;">/</span>
                <a id="breadcrumbRanking" href="#" style="color: #00d4ff; text-decoration: none;">加载中...</a>
                <span style="margin: 0 10px;">/</span>
                <span id="breadcrumbEntity">加载中...</span>
            </div>
            
            <div id="entityDetail" style="
                background: rgba(15,15,25,0.95);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(0,212,255,0.2);
                border-radius: 20px;
                padding: 40px;
            ">
                <div class="loading-dots" style="text-align:center; padding:60px 0; color:#9090a0; font-size:18px;">
                    <span>●</span> <span>●</span> <span>●</span>
                </div>
            </div>
            
            <!-- 上下实体导航 -->
            <div id="entityNav" class="entity-nav" style="display:none;"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-top">
                <div class="footer-brand">
                    <h3>🏛️ 赛博方舟 | Cyber Ark</h3>
                    <p>人类顶级文明数字载体，典藏全球高价值资产</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 赛博方舟 Cyber Ark. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script src="pathUtils.js"></script>
    <script src="script.js"></script>
    <script>
    // 实体详情页 - 加载并渲染 Markdown 内容
    let entityData = null; // 当前榜单的实体列表
    let currentEntityIndex = -1;
    
    document.addEventListener('DOMContentLoaded', async function() {
        // 等待全局 navTree 就绪
        let waited = 0;
        while ((!navTree || navTree.length === 0) && waited < 5000) {
            await new Promise(r => setTimeout(r, 100));
            waited += 100;
        }
        if (!navTree || navTree.length === 0) {
            try {
                const r = await fetch('data/nav-tree.json');
                navTree = await r.json();
            } catch(e) {
                document.getElementById('entityDetail').innerHTML = '<p style="color:#ff6b6b;text-align:center;">数据加载失败</p>';
                return;
            }
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const catSlug = urlParams.get('cat');
        const subSlug = urlParams.get('sub');
        const entityFile = urlParams.get('entity');

        if (!catSlug || !subSlug || !entityFile) {
            document.getElementById('entityDetail').innerHTML = '<p style="color:#ff6b6b;text-align:center;">参数错误：缺少 cat/sub/entity</p>';
            return;
        }

        // 检测是否存在专属 HTML 详情页，存在则直接跳转
        const mdPath = buildMdPath(catSlug, subSlug, entityFile);
        const htmlPath = mdPath.replace(/\.md$/, '.html');
        try {
            const probe = await fetch(htmlPath, { method: 'HEAD' });
            if (probe.ok) {
                window.location.replace(htmlPath);
                return;
            }
        } catch(e) { /* 无专属页，继续正常渲染 */ }
        
        // 解析子子分类路径（如 medicine/Century-Pharmaceutical-Companies-Top50）
        const isSubSub = subSlug.includes('/');
        const parentSubSlug = isSubSub ? subSlug.split('/')[0] : subSlug;
        const childSlug = isSubSub ? subSlug.split('/').slice(1).join('/') : '';
        
        // 查找分类和榜单
        const category = navTree.find(c => c.slug === catSlug);
        const subcategory = category ? category.subcategories.find(s => s.slug === parentSubSlug) : null;
        
        // 更新面包屑
        if (category) {
            document.getElementById('breadcrumbCategory').textContent = category.name;
            document.getElementById('breadcrumbCategory').href = buildRankingsUrl(catSlug);
        }
        if (subcategory) {
            const rankingEl = document.getElementById('breadcrumbRanking');
            if (isSubSub) {
                // 三级面包屑
                rankingEl.innerHTML = `<a href="${buildEntityListUrl(catSlug, parentSubSlug)}" style="color:#00d4ff;text-decoration:none;">${subcategory.name}</a> › <a href="${buildEntityListUrl(catSlug, subSlug)}" style="color:#00d4ff;text-decoration:none;">${childSlug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</a>`;
            } else {
                rankingEl.textContent = subcategory.name;
                rankingEl.href = buildEntityListUrl(catSlug, subSlug);
            }
        }
        
        // 加载实体列表（用于上下导航）
        try {
            let idxResp = await fetch(buildEntitiesJsonPath(catSlug, subSlug, entityFile));
            if (!idxResp.ok && isSubSub) {
                idxResp = await fetch(buildEntitiesJsonPath(catSlug, parentSubSlug));
            }
            if (idxResp.ok) {
                entityData = await idxResp.json();
                currentEntityIndex = entityData.findIndex(e => e.file === entityFile);
            }
        } catch(e) { /* 忽略，导航功能可选 */ }
        
        // entityFile 可能包含子目录前缀，buildMdPath 统一处理
        const mdUrl = buildMdPath(catSlug, subSlug, entityFile);

        // 检测是否存在同名专属 HTML 页面，有则直接跳转
        const htmlUrl = mdUrl.replace(/\.md$/, '_page.html');
        try {
            const htmlCheck = await fetch(htmlUrl, { method: 'HEAD' });
            if (htmlCheck.ok) {
                window.location.replace(htmlUrl);
                return;
            }
        } catch(e) { /* 无专属页面，继续检测 media.json */ }

        // 检测是否存在 media.json，有则渲染富媒体页面
        const mediaJsonUrl = mdUrl.replace(/\.md$/, '_media.json');
        try {
            const mediaCheck = await fetch(mediaJsonUrl);
            if (mediaCheck.ok) {
                const mediaData = await mediaCheck.json();
                renderRichMediaPage(mediaData, catSlug, subSlug, entityFile);
                return;
            }
        } catch(e) { /* 无 media.json，继续渲染普通 MD */ }

        try {
            const mdResp = await fetch(mdUrl);
            if (!mdResp.ok) throw new Error(`HTTP ${mdResp.status}`);
            const mdText = await mdResp.text();
            
            // 用 marked 渲染
            const htmlContent = marked.parse(mdText);
            document.getElementById('entityDetail').innerHTML = `<div class="md-content">${htmlContent}</div>`;
            
            // 提取 h1 作为页面标题和面包屑
            const h1 = document.querySelector('.md-content h1');
            const entityName = h1 ? h1.textContent : entityFile.replace('.md', '');
            document.title = `${entityName} - 赛博方舟`;
            document.getElementById('breadcrumbEntity').textContent = entityName;
            
            // 加载图片画廊
            await loadEntityResources(catSlug, subSlug, entityFile);
            
            // 加载图片画廊
            await loadEntityResources(catSlug, subSlug, entityFile);
            
            // 渲染上下导航
            renderEntityNav(catSlug, subSlug, entityFile);
        } catch(error) {
            console.error('加载 Markdown 失败:', error);
            document.getElementById('entityDetail').innerHTML = `
                <div style="text-align:center; padding:60px 0;">
                    <p style="font-size:4rem; margin-bottom:20px;">📄</p>
                    <h2 style="color:#e0e0f6; margin-bottom:15px;">${entityFile.replace('.md','')}</h2>
                    <p style="color:#9090a0;">Markdown 内容加载失败</p>
                    <p style="color:#606070; font-size:13px; margin-top:10px;">${error.message}</p>
                </div>
            `;
            document.getElementById('breadcrumbEntity').textContent = entityFile.replace('.md', '');
        }
    });

    function renderRichMediaPage(data, catSlug, subSlug, entityFile) {
        // md 文件所在目录，用于解析 media.json 中的相对路径
        const mdUrl = buildMdPath(catSlug, subSlug, entityFile);
        const mdDir = mdUrl.substring(0, mdUrl.lastIndexOf('/') + 1);
        const resolvePath = p => (p && !p.startsWith('http')) ? mdDir + p : p;

        // 更新页面标题和面包屑
        document.title = `${data.name} - 赛博方舟`;
        document.getElementById('breadcrumbEntity').textContent = data.name;

        // 构建富媒体页面 HTML
        let html = `
            <style>
                .rm-page { max-width: 960px; margin: 0 auto; padding: 30px 0 60px; }

                /* 上：图片区 */
                .rm-image { text-align: center; margin-bottom: 50px; }
                .rm-image-inner {
                    position: relative;
                    display: inline-block;
                    border-radius: 12px;
                    overflow: hidden;
                }
                .rm-image img { max-width: 100%; max-height: 600px; border-radius: 12px; display: block; cursor: none; }
                .rm-image-caption { margin-top: 12px; color: #808090; font-size: 0.9rem; }

                /* 扫光效果 */
                .rm-image-inner::after {
                    content: '';
                    position: absolute;
                    inset: 0;
                    background: linear-gradient(
                        115deg,
                        transparent 20%,
                        rgba(255,255,255,0.0) 35%,
                        rgba(255,255,255,0.45) 50%,
                        rgba(255,240,200,0.25) 55%,
                        transparent 70%
                    );
                    background-size: 250% 100%;
                    background-position: 200% 0;
                    opacity: 0;
                    pointer-events: none;
                    border-radius: 12px;
                    transition: none;
                }
                .rm-image-inner:hover::after {
                    animation: rm-shimmer 1.2s ease forwards;
                }
                @keyframes rm-shimmer {
                    0%   { background-position: 200% 0; opacity: 1; }
                    100% { background-position: -50% 0; opacity: 1; }
                }

                /* 放大镜效果 — 挂在 body，position:fixed 脱离文档流 */
                #rm-magnifier-global {
                    position: fixed;
                    width: 200px; height: 200px;
                    border-radius: 50%;
                    border: 2px solid rgba(180,160,255,0.6);
                    box-shadow: 0 4px 24px rgba(0,0,0,0.7);
                    pointer-events: none;
                    overflow: hidden;
                    display: none;
                    z-index: 99999;
                    transform: translate(-50%, -50%);
                }

                /* 下：高价值电子制品 */
                .rm-media-title { font-size: 1.1rem; color: #9090a0; font-weight: 400; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
                .rm-media-title span { color: #e0e0f6; font-weight: 600; }
                .rm-items { display: flex; flex-direction: column; gap: 16px; }
                .rm-item { background: rgba(255,255,255,0.04); border-radius: 10px; overflow: hidden; }
                .rm-item iframe { display: block; width: 100%; border: none; aspect-ratio: 16/9; }
                .rm-item-link { display: flex; align-items: center; gap: 14px; padding: 16px 20px; text-decoration: none; color: #e0e0f6; transition: background 0.2s; }
                .rm-item-link:hover { background: rgba(255,255,255,0.06); }
                .rm-item-icon { font-size: 1.8rem; flex-shrink: 0; }
                .rm-item-info { flex: 1; min-width: 0; }
                .rm-item-name { font-size: 1rem; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
                .rm-item-meta { font-size: 0.82rem; color: #808090; }
                .rm-item-arrow { color: #606070; font-size: 1.2rem; flex-shrink: 0; }

                .rm-empty { color: #606070; text-align: center; padding: 40px; font-size: 0.95rem; }

                @media (max-width: 600px) {
                    .rm-page { padding: 16px 0 40px; }
                }
            </style>

            <div class="rm-page">`;

        // 上：图片
        if (data.avatar) {
            const caption = data.title ? `${data.name} · ${data.title}` : data.name;
            html += `
                <div class="rm-image">
                    <div class="rm-image-inner">
                        <img id="rm-avatar-img" src="${resolvePath(data.avatar)}" alt="${data.name}">
                    </div>
                    <p class="rm-image-caption">${caption}</p>
                </div>`;
        }

        // 下：高价值电子制品
        // 收集所有媒体条目
        const mediaItems = [];

        // gallery 图片
        if (data.gallery && data.gallery.length > 0) {
            data.gallery.forEach(item => {
                mediaItems.push({ type: 'image', url: resolvePath(item.url), name: item.caption || item.role, meta: item.role || '' });
            });
        }

        // filmography 作品链接（豆瓣/IMDB等，若有 link 字段）
        if (data.filmography && data.filmography.length > 0) {
            data.filmography.forEach(film => {
                if (film.link) {
                    mediaItems.push({ type: 'link', url: film.link, name: film.title, meta: `${film.year}${film.rating ? ' · ★' + film.rating : ''}${film.boxOffice ? ' · ' + film.boxOffice : ''}` });
                }
            });
        }

        const iconMap = { embed: '▶', link: '🔗', image: '🖼' };
        const platformIcon = { YouTube: '▶', bilibili: '▶', 'Google Arts & Culture': '🎨', Spotify: '🎵', 原典: '📖', 全景: '🌐', Wikipedia: '📚', 豆瓣: '🎬', IMDB: '🎬' };

        // media 字段（通用链接/嵌入条目）
        if (data.media && data.media.length > 0) {
            data.media.forEach(item => {
                mediaItems.push({
                    type: item.type || 'link',
                    url: item.url,
                    name: item.name,
                    meta: item.platform || item.description || '',
                    desc: item.description || ''
                });
            });
        }

        html += `
                <div class="rm-media-title">高价值电子制品 <span>${mediaItems.length} 项</span></div>
                <div class="rm-items">`;

        if (mediaItems.length === 0) {
            html += `<div class="rm-empty">暂无电子制品，可在 media.json 中添加 media / gallery / filmography 字段</div>`;
        } else {
            mediaItems.forEach(item => {
                if (item.type === 'embed') {
                    html += `
                    <div class="rm-item">
                        <iframe src="${item.url}" allowfullscreen loading="lazy"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                        </iframe>
                    </div>`;
                } else if (item.type === 'image') {
                    html += `
                    <div class="rm-item">
                        <img src="${item.url}" alt="${item.name}" style="width:100%;border-radius:10px;display:block;"
                            onerror="this.style.display='none'">
                    </div>`;
                } else {
                    const icon = platformIcon[item.meta] || '🔗';
                    const subtitle = item.desc && item.desc !== item.meta ? item.desc : item.meta;
                    html += `
                    <div class="rm-item">
                        <a class="rm-item-link" href="${item.url}" target="_blank" rel="noopener">
                            <span class="rm-item-icon">${icon}</span>
                            <div class="rm-item-info">
                                <div class="rm-item-name">${item.name}</div>
                                <div class="rm-item-meta">${subtitle}</div>
                            </div>
                            <span class="rm-item-arrow">›</span>
                        </a>
                    </div>`;
                }
            });
        }

        html += `
                </div>
            </div>`;

        document.getElementById('entityDetail').innerHTML = html;
        renderEntityNav(catSlug, subSlug, entityFile);

        // 放大镜：挂在 body，完全脱离容器层级
        const avatarImg = document.getElementById('rm-avatar-img');
        if (avatarImg) {
            const ZOOM = 2.5;
            const MAG_R = 100;

            // 复用或新建 body 级放大镜
            let magnifier = document.getElementById('rm-magnifier-global');
            if (!magnifier) {
                magnifier = document.createElement('div');
                magnifier.id = 'rm-magnifier-global';
                document.body.appendChild(magnifier);
            }
            magnifier.innerHTML = '';

            const zoomImg = document.createElement('img');
            zoomImg.style.cssText = 'position:absolute; pointer-events:none; max-width:none; border-radius:0;';
            magnifier.appendChild(zoomImg);

            // 监听 document，用 rect 判断是否在图片范围内
            function onMove(e) {
                const rect = avatarImg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                if (x < 0 || y < 0 || x > rect.width || y > rect.height) {
                    magnifier.style.display = 'none';
                    return;
                }

                magnifier.style.display = 'block';
                magnifier.style.left = e.clientX + 'px';
                magnifier.style.top  = e.clientY + 'px';

                zoomImg.src = avatarImg.src;
                zoomImg.style.width  = (rect.width  * ZOOM) + 'px';
                zoomImg.style.height = (rect.height * ZOOM) + 'px';
                zoomImg.style.left   = (MAG_R - x * ZOOM) + 'px';
                zoomImg.style.top    = (MAG_R - y * ZOOM) + 'px';
            }

            function onLeave(e) {
                const rect = avatarImg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                if (x < 0 || y < 0 || x > rect.width || y > rect.height) {
                    magnifier.style.display = 'none';
                }
            }

            // 清理旧监听器，避免重复注册
            document.removeEventListener('mousemove', document._rmMoveHandler);
            document.removeEventListener('mousemove', document._rmLeaveHandler);
            document._rmMoveHandler = onMove;
            document._rmLeaveHandler = onLeave;
            document.addEventListener('mousemove', onMove);
        }
    }

    function renderEntityNav(catSlug, subSlug, currentFile) {
        if (!entityData || currentEntityIndex < 0) return;
        
        const nav = document.getElementById('entityNav');
        nav.style.display = 'flex';
        
        let prevHtml = '', nextHtml = '';
        
        if (currentEntityIndex > 0) {
            const prev = entityData[currentEntityIndex - 1];
            prevHtml = `<a href="${buildEntityPageUrl(catSlug, subSlug, prev.file)}" class="prev">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <div><div class="nav-label">上一个</div><div class="nav-title">${prev.name}</div></div>
            </a>`;
        } else {
            prevHtml = '<span></span>';
        }
        
        if (currentEntityIndex < entityData.length - 1) {
            const next = entityData[currentEntityIndex + 1];
            nextHtml = `<a href="${buildEntityPageUrl(catSlug, subSlug, next.file)}" class="next">
                <div style="text-align:right;"><div class="nav-label">下一个</div><div class="nav-title">${next.name}</div></div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>`;
        } else {
            nextHtml = '<span></span>';
        }
        
        nav.innerHTML = prevHtml + nextHtml;
    }
    
    // ==================== 图片画廊功能 ====================
    
    let galleryImages = [];
    let currentImageIndex = 0;
    
    async function loadEntityResources(catSlug, subSlug, entityFile) {
        // 构建 resources 文件夹路径
        const mdDir = buildMdDirPath(catSlug, subSlug);
        const resourcesPath = `${mdDir}/resources`;
        const resourcesJsonPath = `${resourcesPath}/resources.json`;
        
        try {
            // 尝试加载 resources.json 清单文件
            const resp = await fetch(resourcesJsonPath);
            if (resp.ok) {
                const data = await resp.json();
                if (data.images && data.images.length > 0) {
                    galleryImages = data.images.map(img => ({
                        src: `${resourcesPath}/${img.filename}`,
                        caption: img.caption || ''
                    }));
                    renderGallery();
                    return;
                }
            }
        } catch(e) {
            console.log('resources.json 不存在，尝试自动扫描...');
        }
        
        // 如果没有 resources.json，尝试自动扫描常见图片文件
        await scanResourcesFolder(resourcesPath);
    }
    
    async function scanResourcesFolder(resourcesPath) {
        // 尝试加载可能的图片文件（1.jpg, 2.png 等）
        const extensions = ['jpg', 'jpeg', 'png', 'webp', 'gif'];
        const maxImages = 20;
        
        for (let i = 1; i <= maxImages; i++) {
            for (const ext of extensions) {
                const filename = `${i}.${ext}`;
                const imgPath = `${resourcesPath}/${filename}`;
                try {
                    const probe = await fetch(imgPath, { method: 'HEAD' });
                    if (probe.ok) {
                        galleryImages.push({
                            src: imgPath,
                            caption: `图片 ${i}`
                        });
                    }
                } catch(e) { /* 忽略 */ }
            }
        }
        
        if (galleryImages.length > 0) {
            renderGallery();
        }
    }
    
    function renderGallery() {
        if (galleryImages.length === 0) return;
        
        const galleryHtml = `
            <div class="image-gallery">
                <h2 class="gallery-title">📷 图片画廊 (${galleryImages.length}张)</h2>
                <div class="gallery-grid">
                    ${galleryImages.map((img, idx) => `
                        <div class="gallery-item" onclick="openLightbox(${idx})">
                            <img src="${img.src}" alt="${img.caption}" loading="lazy">
                            ${img.caption ? `<div class="gallery-item-caption">${img.caption}</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        
        // 插入到 entityDetail 末尾
        const detailDiv = document.getElementById('entityDetail');
        detailDiv.insertAdjacentHTML('beforeend', galleryHtml);
        
        // 添加灯箱 HTML
        if (!document.getElementById('lightbox')) {
            const lightboxHtml = `
                <div class="lightbox" id="lightbox">
                    <div class="lightbox-content">
                        <img id="lightbox-img" src="" alt="">
                    </div>
                    <button class="lightbox-close" onclick="closeLightbox()">×</button>
                    <button class="lightbox-prev" onclick="lightboxNav(-1)">‹</button>
                    <button class="lightbox-next" onclick="lightboxNav(1)">›</button>
                    <div class="lightbox-caption" id="lightbox-caption"></div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', lightboxHtml);
            
            // 点击背景关闭灯箱
            document.getElementById('lightbox').addEventListener('click', function(e) {
                if (e.target === this) closeLightbox();
            });
            
            // 键盘导航
            document.addEventListener('keydown', function(e) {
                const lightbox = document.getElementById('lightbox');
                if (!lightbox.classList.contains('active')) return;
                
                if (e.key === 'Escape') closeLightbox();
                else if (e.key === 'ArrowLeft') lightboxNav(-1);
                else if (e.key === 'ArrowRight') lightboxNav(1);
            });
        }
    }
    
    function openLightbox(idx) {
        currentImageIndex = idx;
        const lightbox = document.getElementById('lightbox');
        const img = galleryImages[idx];
        
        document.getElementById('lightbox-img').src = img.src;
        document.getElementById('lightbox-caption').textContent = img.caption || '';
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
        const lightbox = document.getElementById('lightbox');
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    function lightboxNav(direction) {
        currentImageIndex += direction;
        if (currentImageIndex < 0) currentImageIndex = galleryImages.length - 1;
        if (currentImageIndex >= galleryImages.length) currentImageIndex = 0;
        
        const img = galleryImages[currentImageIndex];
        document.getElementById('lightbox-img').src = img.src;
        document.getElementById('lightbox-caption').textContent = img.caption || '';
    }
    
    // 构建 MD 文件所在目录路径（辅助函数）
    function buildMdDirPath(catSlug, subSlug) {
        const isSubSub = subSlug.includes('/');
        const parentSubSlug = isSubSub ? subSlug.split('/')[0] : subSlug;
        const childSlug = isSubSub ? subSlug.split('/').slice(1).join('/') : '';
        
        if (isSubSub) {
            return `data/md/${catSlug}/${parentSubSlug}/${childSlug}`;
        } else {
            return `data/md/${catSlug}/${subSlug}`;
        }
    }
    </script>
