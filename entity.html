<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实体详情 - 赛博方舟</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particleCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></canvas>
    
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🏛️</span>
                <span class="logo-text">赛博方舟</span>
                <span class="logo-subtitle">Cyber Ark</span>
            </a>
            
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="index.html#categories" class="nav-link">分类</a>
                <a href="#" class="nav-link" onclick="showAbout()">关于</a>
            </div>
            
            <div class="nav-actions">
                <div class="search-box">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-input" id="globalSearch" placeholder="搜索实体、分类、标签...">
                </div>
                
                <button class="nav-btn" onclick="toggleDarkMode()" title="切换暗黑模式">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                
                <button class="nav-btn" onclick="showFavorites()" title="收藏夹">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </button>
                
                <button class="nav-btn" onclick="showUserPanel()" title="用户">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- 实体详情区 -->
    <section class="entity-detail-page" style="padding: 120px 0 80px; min-height: calc(100vh - 200px);">
        <div class="container">
            <div id="entityDetail">
                <!-- 实体详情将通过 JavaScript 动态渲染 -->
                <p style="color: #9090a0; text-align: center; padding: 100px 0;">加载中...</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer style="
        background: rgba(10,10,15,0.98);
        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(0,212,255,0.1);
        padding: 60px 0 30px;
        margin-top: 80px;
    ">
        <div class="container">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; margin-bottom: 40px;">
                <div>
                    <h3 style="color: #e0e0f6; font-size: 1.2rem; margin-bottom: 20px;">赛博方舟</h3>
                    <p style="color: #9090a0; font-size: 14px; line-height: 1.8;">AI时代高质量数字文明资产典藏平台，致力于保存、整理、展示人类顶级文明成果。</p>
                </div>
                
                <div>
                    <h3 style="color: #e0e0f6; font-size: 1.2rem; margin-bottom: 20px;">快速链接</h3>
                    <ul style="list-style: none; padding: 0;">
                        <li style="margin-bottom: 10px;"><a href="index.html" style="color: #9090a0; text-decoration: none; transition: color 0.3s ease;">首页</a></li>
                        <li style="margin-bottom: 10px;"><a href="index.html#categories" style="color: #9090a0; text-decoration: none; transition: color 0.3s ease;">全部分类</a></li>
                        <li style="margin-bottom: 10px;"><a href="#" style="color: #9090a0; text-decoration: none; transition: color 0.3s ease;">精选推荐</a></li>
                        <li style="margin-bottom: 10px;"><a href="#" style="color: #9090a0; text-decoration: none; transition: color 0.3s ease;">关于我们</a></li>
                    </ul>
                </div>
                
                <div>
                    <h3 style="color: #e0e0f6; font-size: 1.2rem; margin-bottom: 20px;">联系我们</h3>
                    <p style="color: #9090a0; font-size: 14px; line-height: 1.8;">
                        邮箱: contact@cyberark.ai<br>
                        GitHub: github.com/cyberark
                    </p>
                </div>
            </div>
            
            <div style="border-top: 1px solid rgba(0,212,255,0.1); padding-top: 30px; text-align: center;">
                <p style="color: #9090a0; font-size: 14px;">© 2026 赛博方舟 Cyber Ark. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script src="script.js"></script>
    <script>
    // 渲染实体详情页面
    function renderEntityDetailPage() {
        const urlParams = new URLSearchParams(window.location.search);
        const entityId = parseInt(urlParams.get('id'));
        const entity = sampleEntities.find(e => e.id === entityId);
        
        if (!entity) {
            document.getElementById('entityDetail').innerHTML = '<p style="color: #9090a0; text-align: center;">未找到该实体</p>';
            return;
        }
        
        // 更新页面标题
        document.title = `${entity.name} - 赛博方舟`;
        
        const detail = document.getElementById('entityDetail');
        const stars = '★'.repeat(entity.rating) + '☆'.repeat(5 - entity.rating);
        
        detail.innerHTML = `
            <div class="entity-detail-header" style="
                display: flex;
                gap: 40px;
                margin-bottom: 50px;
                background: rgba(15,15,25,0.95);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(0,212,255,0.2);
                border-radius: 20px;
                padding: 40px;
            ">
                <div class="entity-detail-thumbnail" style="
                    font-size: 8rem;
                    text-align: center;
                    min-width: 200px;
                ">${entity.thumbnail}</div>
                <div class="entity-detail-info" style="flex: 1;">
                    <h2 class="entity-detail-name" style="
                        font-size: 2.5rem;
                        background: linear-gradient(135deg, #00d4ff, #c9a84c);
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                        margin-bottom: 15px;
                    ">${entity.name}</h2>
                    <div class="entity-detail-meta" style="
                        display: flex;
                        gap: 20px;
                        margin-bottom: 20px;
                        color: #9090a0;
                        font-size: 14px;
                    ">
                        <span class="meta-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                <line x1="7" y1="7" x2="7.01" y2="7"></line>
                            </svg>
                            ${entity.category}
                        </span>
                        <span class="meta-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            ${entity.year}
                        </span>
                    </div>
                    <div class="entity-detail-tags" style="
                        display: flex;
                        flex-wrap: wrap;
                        gap: 8px;
                        margin-bottom: 20px;
                    ">
                        ${entity.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="entity-rating" style="margin-bottom: 1.5rem; font-size: 1.2rem; color: #c9a84c;">${stars}</div>
                    <div class="entity-detail-actions" style="display: flex; gap: 15px;">
                        <button class="btn-primary" onclick="alert('收藏功能开发中')" style="
                            padding: 10px 25px;
                            border: none;
                            border-radius: 8px;
                            background: linear-gradient(135deg, #00d4ff, #0099cc);
                            color: #0a0a0f;
                            font-weight: 600;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            gap: 8px;
                            transition: all 0.3s ease;
                        ">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            收藏
                        </button>
                        <button class="btn-secondary" onclick="alert('分享功能开发中')" style="
                            padding: 10px 25px;
                            border: 1px solid rgba(0,212,255,0.3);
                            border-radius: 8px;
                            background: transparent;
                            color: #00d4ff;
                            font-weight: 600;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            gap: 8px;
                            transition: all 0.3s ease;
                        ">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="18" cy="5" r="3"></circle>
                                <circle cx="6" cy="12" r="3"></circle>
                                <circle cx="18" cy="19" r="3"></circle>
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                            </svg>
                            分享
                        </button>
                    </div>
                </div>
            </div>
            <div class="entity-detail-body" style="
                background: rgba(15,15,25,0.95);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(0,212,255,0.2);
                border-radius: 20px;
                padding: 40px;
            ">
                <h3 style="
                    color: #e0e0f6;
                    font-size: 1.8rem;
                    margin-bottom: 20px;
                    background: linear-gradient(135deg, #00d4ff, #c9a84c);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                ">详细介绍</h3>
                <p style="color: #a0a0b5; font-size: 16px; line-height: 1.8; margin-bottom: 20px;">${entity.desc}</p>
                <p style="color: #9090a0; font-size: 14px; line-height: 1.8; margin-bottom: 20px;">这里是${entity.name}的详细内容介绍。完整版本将包含：</p>
                <ul style="color: #a0a0b5; font-size: 14px; line-height: 1.8; margin-bottom: 30px; padding-left: 20px;">
                    <li>完整的背景介绍</li>
                    <li>发展历程与演变</li>
                    <li>核心价值与意义</li>
                    <li>历史影响与评价</li>
                    <li>相关资源与延伸阅读</li>
                </ul>
                
                <h3 style="
                    color: #e0e0f6;
                    font-size: 1.8rem;
                    margin-bottom: 20px;
                    background: linear-gradient(135deg, #00d4ff, #c9a84c);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                ">精华内容专区</h3>
                <p style="color: #9090a0; font-size: 14px; line-height: 1.8; margin-bottom: 20px;">根据内容类型，这里将展示：</p>
                <ul style="color: #a0a0b5; font-size: 14px; line-height: 1.8; margin-bottom: 30px; padding-left: 20px;">
                    <li><strong style="color: #00d4ff;">文本类</strong>：经典段落节选、核心思想摘要</li>
                    <li><strong style="color: #00d4ff;">图片类</strong>：高清图片展示、细节放大</li>
                    <li><strong style="color: #00d4ff;">音频/视频类</strong>：经典片段预览、精彩片段</li>
                    <li><strong style="color: #00d4ff;">书籍类</strong>：原作阅览、章节选读</li>
                </ul>
                
                <h3 style="
                    color: #e0e0f6;
                    font-size: 1.8rem;
                    margin-bottom: 20px;
                    background: linear-gradient(135deg, #00d4ff, #c9a84c);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                ">相关推荐</h3>
                <p style="color: #9090a0; font-size: 14px; line-height: 1.8; margin-bottom: 20px;">与${entity.name}相关的其他高价值实体：</p>
                <div style="
                    display: grid;
                    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                    gap: 15px;
                    margin-top: 20px;
                ">
                    ${sampleEntities.filter(e => e.category === entity.category && e.id !== entity.id).slice(0, 3).map(related => `
                        <div style="
                            background: rgba(15,15,25,0.95);
                            backdrop-filter: blur(20px);
                            border: 1px solid rgba(0,212,255,0.2);
                            border-radius: 12px;
                            padding: 15px;
                            cursor: pointer;
                            transition: all 0.3s ease;
                        " onmouseover="this.style.borderColor='rgba(0,212,255,0.6)';" onmouseout="this.style.borderColor='rgba(0,212,255,0.2)';" onclick="window.location.href='entity.html?id=${related.id}'">
                            <div style="font-size: 2rem; margin-bottom: 10px; text-align: center;">${related.thumbnail}</div>
                            <h4 style="color: #e0e0f6; font-size: 1rem; margin-bottom: 5px;">${related.name}</h4>
                            <p style="color: #9090a0; font-size: 12px;">${related.year}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }
    
    // 页面加载完成后渲染
    document.addEventListener('DOMContentLoaded', renderEntityDetailPage);
    </script>
</body>
</html>
